apiVersion: batch/v1
kind: Job
metadata:
  name: gateway-migrate
  namespace: pharmtrack
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: 9moses/gateway:__IMAGE_TAG__
          command: ["python", "manage.py", "migrate", "--noinput"]
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          envFrom:
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: gateway-app-secret
            - secretRef:
                name: gateway-db-secret
            - secretRef:
                name: redis-secret
            - secretRef:
                name: rabbitmq-secret
      imagePullSecrets:
        - name: regcred
