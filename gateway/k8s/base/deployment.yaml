apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: pharmtrack
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: gateway
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: gateway
          image: 9moses/gateway:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: gateway-app-secret
            - secretRef:
                name: gateway-db-secret
            - secretRef:
                name: redis-secret
            - secretRef:
                name: rabbitmq-secret
          readinessProbe:
            httpGet:
              path: /healthz/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz/
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gateway-db-secret
                  key: POSTGRES_PASSWORD
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: gateway-db-secret
                  key: POSTGRES_USER
            # Compose REDIS_URL from REDIS_PASSWORD injected via envFrom (redis-secret).
            # $(VAR) expansion works here in Pod env: blocks, unlike in ConfigMap data.
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis.pharmtrack.svc.cluster.local:6379/0"
            # Compose the full AMQP URL from rabbitmq-secret vars (loaded via envFrom).
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_DEFAULT_USER):$(RABBITMQ_DEFAULT_PASS)@rabbitmq.pharmtrack.svc.cluster.local:5672/pharmtrack"
