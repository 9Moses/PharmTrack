apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: pharmtrack
  labels:
    app: email-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: email-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: email-service
          image: 9moses/email-service:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          envFrom:
            - secretRef:
                name: email-service-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
