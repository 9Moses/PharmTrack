<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Delivery Completed — PharmTrack</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#f4f6f9; margin:0; padding:0; }
    .wrapper { max-width:560px; margin:40px auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .header  { background:#1a56db; padding:32px 40px; }
    .header h1 { color:#fff; margin:0; font-size:22px; }
    .body    { padding:36px 40px; color:#374151; }
    .success-box { background:#d1fae5; border-left:4px solid #059669; border-radius:6px; padding:16px 20px; margin:20px 0; }
    .footer  { background:#f9fafb; padding:20px 40px; text-align:center; font-size:12px; color:#9ca3af; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header"><h1>✅ Delivery Completed</h1></div>
    <div class="body">
      <p>Hello <strong>{{ customer_name }}</strong>,</p>
      <div class="success-box">
        <strong>Your delivery to {{ destination }} has been completed successfully.</strong>
      </div>
      <p>Delivery ID: <code>{{ delivery_id }}</code></p>
      <p>Thank you for using PharmTrack.</p>
    </div>
    <div class="footer">© {{ year }} PharmTrack</div>
  </div>
</body>
</html>
