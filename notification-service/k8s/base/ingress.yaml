apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notification-service
  namespace: pharmtrack
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: notification-service.pharmtrack.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8002
