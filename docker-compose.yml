version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pharmtrack_rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-pharmtrack}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-pharmtrack_secret}
      RABBITMQ_DEFAULT_VHOST: pharmtrack
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

  postgres_gateway:
    image: postgres:16-alpine
    container_name: pharmtrack_db_gateway
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secret}
    volumes:
      - pgdata_gateway:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

  postgres_delivery:
    image: postgres:16-alpine
    container_name: pharmtrack_db_delivery
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secret}
    volumes:
      - pgdata_delivery:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

  postgres_notification:
    image: postgres:16-alpine
    container_name: pharmtrack_db_notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secret}
    volumes:
      - pgdata_notification:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

  redis:
    image: redis:7-alpine
    container_name: pharmtrack_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

  # ─────────────────────────────────────────────
  # Microservices
  # ─────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: pharmtrack_gateway
    env_file: ./gateway/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres_gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./gateway:/app
    networks:
      - pharmtrack_net
    restart: unless-stopped

  delivery-service:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    container_name: pharmtrack_delivery
    env_file: ./delivery-service/.env
    ports:
      - "8001:8001"
    depends_on:
      postgres_delivery:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./delivery-service:/app
    networks:
      - pharmtrack_net
    restart: unless-stopped

  # Delivery event consumer (worker)
  delivery-consumer:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    container_name: pharmtrack_delivery_consumer
    env_file: ./delivery-service/.env
    command: python manage.py run_consumer
    depends_on:
      postgres_delivery:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./delivery-service:/app
    networks:
      - pharmtrack_net
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: pharmtrack_notification
    env_file: ./notification-service/.env
    ports:
      - "8002:8002"
    depends_on:
      postgres_notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./notification-service:/app
    networks:
      - pharmtrack_net
    restart: unless-stopped

  # Notification consumer (worker)
  notification-consumer:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: pharmtrack_notification_consumer
    env_file: ./notification-service/.env
    command: python manage.py run_consumer
    depends_on:
      postgres_notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./notification-service:/app
    networks:
      - pharmtrack_net
    restart: unless-stopped

  email-service:
    build:
      context: ./email-service
      dockerfile: Dockerfile
    container_name: pharmtrack_email
    env_file: ./email-service/.env
    ports:
      - "8003:8003"
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./email-service:/app
    networks:
      - pharmtrack_net
    restart: unless-stopped

networks:
  pharmtrack_net:
    driver: bridge

volumes:
  rabbitmq_data:
  pgdata_gateway:
  pgdata_delivery:
  pgdata_notification:
  redis_data:
