
services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pharmtrack_rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-pharmtrack}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-pharmtrack_secret}
      RABBITMQ_DEFAULT_VHOST: pharmtrack
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

  postgres_gateway:
    image: postgres:16-alpine
    container_name: pharmtrack_db_gateway
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secret}
    volumes:
      - pgdata_gateway:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

  postgres_delivery:
    image: postgres:16-alpine
    container_name: pharmtrack_db_delivery
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secret}
    volumes:
      - pgdata_delivery:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

  postgres_notification:
    image: postgres:16-alpine
    container_name: pharmtrack_db_notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secret}
    volumes:
      - pgdata_notification:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

  redis:
    image: redis:7-alpine
    container_name: pharmtrack_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmtrack_net

volumes:
  rabbitmq_data:
  redis_data:
  pgdata_gateway:
  pgdata_delivery:
  pgdata_notification:

networks:
  pharmtrack_net:
    name: pharmtrack_net
    driver: bridge
